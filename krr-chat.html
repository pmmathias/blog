<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KRR Chat — Mini-Sprachmodell auf Eigenwerten</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 1rem 1.5rem; border-bottom: 1px solid #1e293b; }
    .header h1 { font-size: 1.1rem; font-weight: 700; background: linear-gradient(90deg, #22d3ee, #60a5fa, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header p { font-size: 0.72rem; color: #64748b; margin-top: 0.25rem; }
    .chat-area { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .msg { max-width: 85%; padding: 0.6rem 1rem; border-radius: 1rem; font-size: 0.88rem; line-height: 1.55; word-break: break-word; font-family: 'SF Mono', 'Menlo', 'Monaco', monospace; letter-spacing: 0.01em; }
    .msg.user { align-self: flex-end; background: #1e3a5f; border-bottom-right-radius: 0.25rem; }
    .msg.bot { align-self: flex-start; background: #1e293b; border-bottom-left-radius: 0.25rem; color: #cbd5e1; }
    .msg.system { align-self: center; background: none; color: #475569; font-size: 0.72rem; text-align: center; padding: 0.5rem; font-family: inherit; }
    .msg .seed { color: #22d3ee; font-weight: 600; }
    .msg .generated { color: #94a3b8; }
    .typing span { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #475569; margin: 0 1px; animation: b 1s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes b { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }
    .input-area { padding: 0.75rem 1rem; border-top: 1px solid #1e293b; display: flex; gap: 0.5rem; }
    .input-area input { flex: 1; background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 0.6rem 1rem; border-radius: 0.75rem; font-size: 0.88rem; outline: none; font-family: inherit; }
    .input-area input:focus { border-color: #22d3ee; }
    .input-area input::placeholder { color: #475569; }
    .input-area button { background: #22d3ee; color: #0f172a; border: none; padding: 0.6rem 1.2rem; border-radius: 0.75rem; font-weight: 600; font-size: 0.85rem; cursor: pointer; }
    .input-area button:hover { background: #06b6d4; }
    .input-area button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .controls { padding: 0.5rem 1.5rem; border-top: 1px solid #1e293b; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; font-size: 0.72rem; color: #64748b; }
    .controls label { display: flex; align-items: center; gap: 0.3rem; }
    .controls input[type=range] { width: 80px; accent-color: #22d3ee; }
    .controls .v { color: #22d3ee; font-family: monospace; min-width: 2.2rem; }
    .badge { display: inline-block; font-size: 0.6rem; background: #1e293b; color: #475569; padding: 0.12rem 0.4rem; border-radius: 0.25rem; margin-left: 0.4rem; font-family: inherit; }
    .status { padding: 0.35rem 1.5rem; font-size: 0.68rem; color: #334155; }
    .status.training { color: #f59e0b; }
    .status.ready { color: #22d3ee; }
    .progress { height: 2px; background: #1e293b; margin: 0; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #22d3ee, #f59e0b); width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>

<div class="header">
  <h1>&#x03BB; KRR Chat</h1>
  <p>Mini-Sprachmodell auf Kernel Ridge Regression — keine neuronalen Netze, nur Eigenwerte &amp; Random Fourier Features.</p>
</div>
<div class="progress"><div id="prog" class="progress-bar"></div></div>
<div id="status" class="status training">Initialisiere...</div>

<div id="chat" class="chat-area"></div>

<div class="controls">
  <label>Temperatur <input type="range" id="temp" min="0.02" max="0.8" step="0.02" value="0.12"> <span class="v" id="tv">0.12</span></label>
  <label>Zeichen <input type="range" id="maxlen" min="20" max="250" step="10" value="100"> <span class="v" id="mv">100</span></label>
  <label style="margin-left:auto;color:#334155;" id="info"></label>
</div>

<div class="input-area">
  <input type="text" id="input" placeholder="z.B. 'eigenvalue', 'the kernel', 'quantum mechanics'..." disabled>
  <button id="send" disabled>&#x27A4;</button>
</div>

<script>
(function() {
  'use strict';

  // === CORPUS ===
  var TEXT = (
    "in linear algebra an eigenvector of a linear transformation is a nonzero vector " +
    "that changes at most by a constant factor when that linear transformation is " +
    "applied to it. the corresponding eigenvalue is the factor by which the eigenvector " +
    "is scaled. geometrically a transformation matrix rotates stretches or shears " +
    "the vectors it acts upon. the prefix eigen is german for own or characteristic. " +
    "eigenvalues are often introduced in the context of linear algebra or matrix theory. " +
    "the concept emerged from the study of quadratic forms and differential equations. " +
    "euler studied the rotational motion of a rigid body and discovered the importance " +
    "of the principal axes. lagrange realized that the principal axes are the eigenvectors " +
    "of the inertia matrix. cauchy proved that symmetric matrices have real eigenvalues. " +
    "in quantum mechanics every observable quantity is associated with a linear operator. " +
    "the eigenvalues of the operator represent the possible measurement outcomes. when a " +
    "measurement is performed the system collapses into one of the eigenstates. the " +
    "energy levels of an atom are the eigenvalues of the hamiltonian operator. the hydrogen " +
    "atom has energy levels proportional to one over n squared. the schrodinger equation " +
    "is itself an eigenvalue equation. the wave functions are the eigenvectors of the " +
    "hamiltonian. every quantum state can be written as a superposition of eigenstates. " +
    "google pagerank is an eigenvalue problem. the importance of a webpage is determined " +
    "by the dominant eigenvector of the google matrix. a random surfer model describes a " +
    "user who clicks on links with probability zero point eight five and teleports to a " +
    "random page with probability zero point one five. the power iteration algorithm " +
    "computes the pagerank vector by repeatedly multiplying the google matrix with the " +
    "current ranking estimate. convergence typically requires about fifty iterations even " +
    "for billions of web pages. larry page and sergey brin developed pagerank at stanford. " +
    "kernel ridge regression is a powerful machine learning method that uses kernel " +
    "functions to perform nonlinear regression. the kernel trick replaces the inner " +
    "product matrix with a kernel matrix allowing the algorithm to work in an infinite " +
    "dimensional feature space without explicitly computing the features. the gaussian " +
    "kernel also known as the radial basis function kernel is one of the most popular " +
    "kernel functions. it measures the similarity between two data points using a bell " +
    "shaped function. the bandwidth parameter sigma controls how quickly the similarity " +
    "decays with distance. a small sigma means only nearby points are considered similar. " +
    "the representer theorem is a fundamental result in kernel methods. it states that " +
    "the optimal solution of kernel ridge regression can always be written as a linear " +
    "combination of kernel evaluations at the training points. this means the training " +
    "data is the model. there are no abstract parameters no weight matrices no hidden " +
    "layers. the function is completely determined by the data points and their kernel " +
    "similarities. this is fundamentally different from neural networks which learn " +
    "abstract internal representations. " +
    "the universal approximation theorem proved by cybenko in nineteen eighty nine shows " +
    "that neural networks with a single hidden layer can approximate any continuous " +
    "function to arbitrary accuracy given enough neurons. similarly kernel ridge regression " +
    "with a universal kernel such as the gaussian kernel can also approximate any continuous " +
    "function to arbitrary accuracy. both function classes are dense in the space of " +
    "continuous functions. this means they are equally powerful in theory. the difference " +
    "is computational efficiency not mathematical power. " +
    "the neural tangent kernel discovered by jacot gabriel and hongler in twenty eighteen " +
    "provides a deep connection between neural networks and kernel methods. in the " +
    "idealized limit of infinite width and suitable initialization a neural network " +
    "trained by gradient descent behaves exactly like kernel ridge regression with the " +
    "neural tangent kernel. this is not a metaphor or an analogy. it is a rigorous " +
    "mathematical theorem. the eigenvalues of the neural tangent kernel determine which " +
    "functions the network learns quickly and which it learns slowly. " +
    "the neumann series is a fundamental tool in linear algebra and functional analysis. " +
    "it states that the sum of all powers of a matrix a converges to the inverse of the " +
    "identity minus a provided that all eigenvalues of a have magnitude strictly less " +
    "than one. this is the matrix generalization of the geometric series. the iterative " +
    "residual correction method exploits this fact by computing the least squares solution " +
    "through repeated error correction instead of direct matrix inversion. each iteration " +
    "reduces the residual. the convergence rate depends on the spectral radius which is " +
    "determined by the eigenvalues. " +
    "regularization is essential for preventing overfitting in machine learning. ridge " +
    "regression adds a penalty term lambda times the squared norm of the coefficients " +
    "to the loss function. this has the effect of shrinking the contributions from small " +
    "eigenvalue directions which typically correspond to noise rather than signal. a " +
    "remarkable equivalence exists between ridge regularization and early stopping of " +
    "iterative methods. the ridge parameter lambda is approximately equal to one divided " +
    "by the number of iterations n. this means regularization is not an artificial trick " +
    "but the natural consequence of stopping the iteration before convergence. " +
    "the fourier transform is one of the most important tools in mathematics and science. " +
    "it decomposes a signal into its constituent frequencies. the sine and cosine functions " +
    "are eigenfunctions of the second derivative operator. the fourier series representation " +
    "of a periodic function is an eigenfunction expansion. this creates a deep connection " +
    "between signal processing quantum mechanics and machine learning through the shared " +
    "mathematical structure of eigenvalue decomposition. " +
    "in computer graphics the radiosity equation describes the global illumination of a " +
    "scene. light energy bounces between surfaces and each bounce adds more realism to " +
    "the rendered image. the radiosity equation is solved using the neumann series where " +
    "each term represents one additional light bounce. typically three to five bounces are " +
    "sufficient for visual convergence. the connection to eigenvalues is direct because " +
    "the convergence of the neumann series depends on the spectral radius of the transfer " +
    "matrix which must have all eigenvalues with magnitude less than one. " +
    "the spectral theorem is one of the most beautiful results in linear algebra. it states " +
    "that every real symmetric matrix can be decomposed into its eigenvalues and eigenvectors. " +
    "the eigenvectors form an orthonormal basis and the eigenvalues are all real numbers. " +
    "principal component analysis uses the spectral theorem to find the directions of " +
    "maximum variance in a dataset. these directions are the eigenvectors of the covariance " +
    "matrix with the largest eigenvalues. " +
    "attention mechanisms in transformer models compute similarity matrices between tokens. " +
    "the softmax normalized attention matrix is essentially a kernel matrix. each attention " +
    "head computes a different kernel. stacking multiple layers of attention is analogous " +
    "to iterating the residual correction with different kernels at each step. the skip " +
    "connections in transformers add the correction to the current estimate exactly like " +
    "the iterative method. transformers are iterative kernel ridge regression with learned " +
    "kernels. this insight connects the entire chain from simple linear regression through " +
    "eigenvalues and kernel methods all the way to the most powerful language models."
  ).toLowerCase();

  // === VOCAB ===
  var C2I = {}, I2C = {}, V = 0;
  for (var i = 0; i < TEXT.length; i++) {
    if (C2I[TEXT[i]] === undefined) { C2I[TEXT[i]] = V; I2C[V] = TEXT[i]; V++; }
  }

  // === CONFIG ===
  var CTX = 10;      // longer context
  var D = 2048;      // more random features
  var SIGMA = 1.8;
  var LAM = 0.005;

  // === FEATURES: positional unigrams + last-4 bigrams (weighted) ===
  var N_BI = 5;
  var UNI_DIM = CTX * V;
  var BI_DIM = N_BI * V * V;
  var FEAT = UNI_DIM + BI_DIM;

  function encode(ctx) {
    var vec = new Float32Array(FEAT);
    // Positional unigrams with exponential weighting
    for (var j = 0; j < CTX; j++) {
      var idx = C2I[ctx[j]];
      if (idx !== undefined) {
        var w = 0.3 + 0.7 * (j / (CTX - 1)); // 0.3 to 1.0
        vec[j * V + idx] = w;
      }
    }
    // Last N_BI bigrams
    for (var j = 0; j < N_BI; j++) {
      var pos = CTX - N_BI + j;
      if (pos < 1) continue;
      var c1 = C2I[ctx[pos - 1]], c2 = C2I[ctx[pos]];
      if (c1 !== undefined && c2 !== undefined) {
        vec[UNI_DIM + j * V * V + c1 * V + c2] = 1.0;
      }
    }
    return vec;
  }

  // === RANDOM FOURIER FEATURES ===
  // Only compute omega for NON-ZERO feature positions (sparse optimization)
  var omega, bias;

  function initRFF() {
    // Standard RFF: z(x) = sqrt(2/D) cos(omega^T x + b)
    omega = new Float32Array(FEAT * D);
    bias = new Float32Array(D);
    // Box-Muller normal
    for (var i = 0; i < FEAT * D; i += 2) {
      var u1 = Math.random(), u2 = Math.random();
      var r = Math.sqrt(-2 * Math.log(Math.max(u1, 1e-10)));
      omega[i] = r * Math.cos(2 * Math.PI * u2) / SIGMA;
      if (i + 1 < FEAT * D) omega[i + 1] = r * Math.sin(2 * Math.PI * u2) / SIGMA;
    }
    for (var i = 0; i < D; i++) bias[i] = Math.random() * 2 * Math.PI;
  }

  function rff(vec) {
    var z = new Float32Array(D);
    var scale = Math.sqrt(2.0 / D);
    // Sparse: only iterate non-zero entries of vec
    var nonzero = [];
    for (var k = 0; k < FEAT; k++) if (vec[k] !== 0) nonzero.push(k);

    for (var j = 0; j < D; j++) {
      var dot = 0;
      for (var ni = 0; ni < nonzero.length; ni++) {
        var k = nonzero[ni];
        dot += vec[k] * omega[k * D + j];
      }
      z[j] = Math.cos(dot + bias[j]) * scale;
    }
    return z;
  }

  // === UI REFS ===
  var prog = document.getElementById('prog');
  var statusEl = document.getElementById('status');
  var chatEl = document.getElementById('chat');
  var inputEl = document.getElementById('input');
  var sendBtn = document.getElementById('send');
  var tempSl = document.getElementById('temp');
  var tempV = document.getElementById('tv');
  var maxSl = document.getElementById('maxlen');
  var maxV = document.getElementById('mv');
  var infoEl = document.getElementById('info');

  tempSl.oninput = function() { tempV.textContent = parseFloat(tempSl.value).toFixed(2); };
  maxSl.oninput = function() { maxV.textContent = maxSl.value; };

  function setStatus(msg, cls, pct) {
    statusEl.textContent = msg; statusEl.className = 'status ' + (cls || '');
    if (pct !== undefined) prog.style.width = pct + '%';
  }

  function addMsg(text, cls) {
    var d = document.createElement('div'); d.className = 'msg ' + cls;
    if (typeof text === 'string') d.textContent = text; else d.appendChild(text);
    chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight; return d;
  }

  // === TRAIN ===
  var W = null; // D x V weight matrix (flat)

  function train() {
    setStatus('Initialisiere Random Fourier Features...', 'training', 5);

    setTimeout(function() {
      initRFF();
      setStatus('Extrahiere Features aus ' + TEXT.length + ' Zeichen...', 'training', 15);

      setTimeout(function() {
        var N = TEXT.length - CTX;
        var Z = new Array(N);    // array of Float32Array[D]
        var Y = new Int32Array(N);

        for (var i = 0; i < N; i++) {
          var ctx = TEXT.substring(i, i + CTX);
          Z[i] = rff(encode(ctx));
          Y[i] = C2I[TEXT[i + CTX]];
          if (i % 2000 === 0) prog.style.width = (15 + 35 * i / N) + '%';
        }

        setStatus('Berechne Z^T Z (' + D + 'x' + D + ')...', 'training', 55);

        setTimeout(function() {
          // ZᵀZ (D×D) — exploit symmetry
          var ZTZ = new Float64Array(D * D);
          for (var i = 0; i < N; i++) {
            var zi = Z[i];
            for (var a = 0; a < D; a++) {
              var za = zi[a];
              if (Math.abs(za) < 1e-8) continue;
              var rowOff = a * D;
              for (var b = a; b < D; b++) {
                var v = za * zi[b];
                ZTZ[rowOff + b] += v;
                if (a !== b) ZTZ[b * D + a] += v;
              }
            }
          }
          for (var i = 0; i < D; i++) ZTZ[i * D + i] += LAM;

          // ZᵀY (D×V)
          var ZTY = new Float64Array(D * V);
          for (var i = 0; i < N; i++) {
            var zi = Z[i], yi = Y[i];
            for (var j = 0; j < D; j++) ZTY[j * V + yi] += zi[j];
          }

          setStatus('Löse ' + D + 'x' + D + ' Gleichungssystem...', 'training', 70);

          setTimeout(function() {
            // Gaussian elimination with partial pivoting
            var cols = D + V;
            var M = new Float64Array(D * cols);
            for (var i = 0; i < D; i++) {
              for (var j = 0; j < D; j++) M[i * cols + j] = ZTZ[i * D + j];
              for (var j = 0; j < V; j++) M[i * cols + D + j] = ZTY[i * V + j];
            }
            ZTZ = null; ZTY = null; // free

            for (var col = 0; col < D; col++) {
              // Partial pivot
              var mr = col, mv = Math.abs(M[col * cols + col]);
              for (var r = col + 1; r < D; r++) {
                var av = Math.abs(M[r * cols + col]);
                if (av > mv) { mv = av; mr = r; }
              }
              if (mr !== col) {
                for (var j = col; j < cols; j++) {
                  var t = M[col * cols + j]; M[col * cols + j] = M[mr * cols + j]; M[mr * cols + j] = t;
                }
              }
              var piv = M[col * cols + col];
              if (Math.abs(piv) < 1e-14) continue;
              for (var r = col + 1; r < D; r++) {
                var f = M[r * cols + col] / piv;
                if (Math.abs(f) < 1e-14) continue;
                for (var j = col; j < cols; j++) M[r * cols + j] -= f * M[col * cols + j];
              }
              if (col % 200 === 0) prog.style.width = (70 + 20 * col / D) + '%';
            }

            // Back substitution → W (D×V)
            W = new Float64Array(D * V);
            for (var i = D - 1; i >= 0; i--) {
              var piv = M[i * cols + i];
              if (Math.abs(piv) < 1e-14) continue;
              for (var v = 0; v < V; v++) {
                var val = M[i * cols + D + v];
                for (var j = i + 1; j < D; j++) val -= M[i * cols + j] * W[j * V + v];
                W[i * V + v] = val / piv;
              }
            }
            M = null; Z = null; // free

            // Quick accuracy check on last 500 chars
            setStatus('Teste...', 'training', 95);
            setTimeout(function() {
              var correct = 0, total = 0;
              var start = Math.max(0, TEXT.length - CTX - 500);
              for (var i = start; i < TEXT.length - CTX; i++) {
                var ctx = TEXT.substring(i, i + CTX);
                var z = rff(encode(ctx));
                var best = -1, bestS = -Infinity;
                for (var v = 0; v < V; v++) {
                  var s = 0;
                  for (var j = 0; j < D; j++) s += z[j] * W[j * V + v];
                  if (s > bestS) { bestS = s; best = v; }
                }
                if (best === C2I[TEXT[i + CTX]]) correct++;
                total++;
              }
              var acc = (100 * correct / total).toFixed(0);

              prog.style.width = '100%';
              setStatus('Bereit — ' + TEXT.length + ' Zeichen, D=' + D + ', ctx=' + CTX + ', accuracy=' + acc + '%', 'ready', 100);
              infoEl.textContent = 'n=' + (TEXT.length - CTX) + ' · D=' + D + ' · V=' + V + ' · acc=' + acc + '%';

              inputEl.disabled = false; sendBtn.disabled = false; inputEl.focus();
              addMsg('Ich bin ein Mini-Sprachmodell, gebaut auf Kernel Ridge Regression mit Random Fourier Features. Kein neuronales Netz — nur Eigenwerte. Trainiert auf ' + TEXT.length + ' Zeichen. Schreib mir etwas!', 'system');
            }, 10);
          }, 10);
        }, 10);
      }, 10);
    }, 10);
  }

  // === PREDICT ===
  function predict(context, temperature) {
    var ctx = context.slice(-CTX).toLowerCase();
    while (ctx.length < CTX) ctx = ' ' + ctx;
    var z = rff(encode(ctx));
    var scores = new Float64Array(V);
    for (var j = 0; j < D; j++) {
      var zj = z[j];
      if (Math.abs(zj) < 1e-8) continue;
      for (var v = 0; v < V; v++) scores[v] += zj * W[j * V + v];
    }
    var maxS = -Infinity;
    for (var v = 0; v < V; v++) if (scores[v] > maxS) maxS = scores[v];
    var sum = 0, probs = new Float64Array(V);
    for (var v = 0; v < V; v++) {
      probs[v] = Math.exp((scores[v] - maxS) / Math.max(temperature, 0.005));
      sum += probs[v];
    }
    for (var v = 0; v < V; v++) probs[v] /= sum;
    var r = Math.random(), c = 0;
    for (var v = 0; v < V; v++) { c += probs[v]; if (r < c) return I2C[v]; }
    return I2C[V - 1];
  }

  // === CHAT ===
  function handleSend() {
    var text = inputEl.value.trim().toLowerCase();
    if (!text || !W) return;
    inputEl.value = '';

    addMsg(text, 'user');

    var temp = parseFloat(tempSl.value);
    var maxLen = parseInt(maxSl.value);

    var botEl = document.createElement('div');
    botEl.className = 'msg bot';
    var seedSpan = document.createElement('span');
    seedSpan.className = 'seed';
    seedSpan.textContent = text;
    var genSpan = document.createElement('span');
    genSpan.className = 'generated';
    botEl.appendChild(seedSpan);
    botEl.appendChild(genSpan);
    chatEl.appendChild(botEl);
    chatEl.scrollTop = chatEl.scrollHeight;

    var generated = text;
    var charIdx = 0;

    function step() {
      if (charIdx >= maxLen) {
        var badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = 'KRR · D=' + D + ' · T=' + temp.toFixed(2);
        botEl.appendChild(badge);
        return;
      }
      var ch = predict(generated, temp);
      generated += ch;
      genSpan.textContent += ch;
      charIdx++;
      chatEl.scrollTop = chatEl.scrollHeight;
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleSend(); });

  // === GO ===
  setTimeout(train, 100);
})();
</script>
</body>
</html>
