<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KRR Chat — Word-Level Language Model on Eigenvalues</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}
    .hd{padding:.8rem 1.2rem;border-bottom:1px solid #1e293b}
    .hd h1{font-size:1rem;font-weight:700;background:linear-gradient(90deg,#22d3ee,#60a5fa,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .hd p{font-size:.68rem;color:#475569;margin-top:.15rem}
    .prog{height:2px;background:#1e293b}.prog-bar{height:100%;background:linear-gradient(90deg,#22d3ee,#f59e0b);width:0%;transition:width .3s}
    .st{padding:.3rem 1.2rem;font-size:.66rem;color:#334155}.st.t{color:#f59e0b}.st.r{color:#22d3ee}
    .chat{flex:1;overflow-y:auto;padding:.8rem 1.2rem;display:flex;flex-direction:column;gap:.6rem}
    .m{max-width:88%;padding:.5rem .9rem;border-radius:.9rem;font-size:.85rem;line-height:1.55;word-break:break-word}
    .m.u{align-self:flex-end;background:#1e3a5f;border-bottom-right-radius:.2rem}
    .m.b{align-self:flex-start;background:#1e293b;border-bottom-left-radius:.2rem;color:#cbd5e1}
    .m.s{align-self:center;background:none;color:#475569;font-size:.7rem;text-align:center;padding:.4rem;max-width:95%}
    .m .sd{color:#22d3ee;font-weight:600}
    .m .gn{color:#94a3b8}
    .bd{display:inline-block;font-size:.55rem;background:#1e293b;color:#475569;padding:.1rem .35rem;border-radius:.2rem;margin-left:.3rem;vertical-align:middle}
    .ip{padding:.6rem .8rem;border-top:1px solid #1e293b;display:flex;gap:.4rem}
    .ip input{flex:1;background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.55rem .9rem;border-radius:.7rem;font-size:.85rem;outline:none}
    .ip input:focus{border-color:#22d3ee}
    .ip input::placeholder{color:#475569}
    .ip button{background:#22d3ee;color:#0f172a;border:none;padding:.55rem 1rem;border-radius:.7rem;font-weight:600;font-size:.82rem;cursor:pointer}
    .ip button:hover{background:#06b6d4}
    .ip button:disabled{background:#334155;color:#64748b;cursor:not-allowed}
    .ct{padding:.4rem 1.2rem;border-top:1px solid #1e293b;display:flex;flex-wrap:wrap;gap:.6rem;align-items:center;font-size:.68rem;color:#64748b}
    .ct label{display:flex;align-items:center;gap:.25rem}
    .ct input[type=range]{width:70px;accent-color:#22d3ee}
    .ct .v{color:#22d3ee;font-family:monospace;min-width:2rem}
    .ex{display:flex;flex-wrap:wrap;gap:.3rem;padding:.3rem 1.2rem;border-top:1px solid #0f172a}
    .ex button{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:.25rem .6rem;border-radius:.5rem;font-size:.7rem;cursor:pointer}
    .ex button:hover{border-color:#22d3ee;color:#22d3ee}
  </style>
</head>
<body>
<div class="hd">
  <h1>&#x03BB; KRR Chat <span style="font-size:.65rem;-webkit-text-fill-color:#475569;font-weight:400;">v2 — word-level</span></h1>
  <p>Kernel Ridge Regression language model. No neural networks — just eigenvalues &amp; Random Fourier Features. Predicts <strong style="color:#94a3b8;">whole words</strong>, not characters.</p>
</div>
<div class="prog"><div id="pb" class="prog-bar"></div></div>
<div id="st" class="st t">Initializing...</div>
<div id="chat" class="chat"></div>
<div class="ex" id="examples"></div>
<div class="ct">
  <label>Temp <input type="range" id="tmp" min="0.05" max="0.8" step="0.05" value="0.15"><span class="v" id="tv">0.15</span></label>
  <label>Top-K <input type="range" id="topk" min="1" max="20" step="1" value="6"><span class="v" id="kv">6</span></label>
  <label>Words <input type="range" id="mw" min="5" max="60" step="1" value="25"><span class="v" id="wv">25</span></label>
  <label style="margin-left:auto;color:#334155" id="nfo"></label>
</div>
<div class="ip">
  <input type="text" id="in" placeholder="Type a few words... (e.g. 'the eigenvalue', 'kernel ridge')" disabled>
  <button id="go" disabled>&#x27A4;</button>
</div>

<script>
(function(){
'use strict';

var RAW =
"in linear algebra an eigenvector of a linear transformation is a nonzero vector that changes at most by a constant factor when that linear transformation is applied to it . the corresponding eigenvalue is the factor by which the eigenvector is scaled . "+
"geometrically a transformation matrix rotates stretches or shears the vectors it acts upon . an eigenvector is a vector whose direction remains unchanged by the transformation . the eigenvalue gives the factor by which the eigenvector is stretched or compressed . "+
"the prefix eigen is german for own or characteristic . eigenvalues and eigenvectors are fundamental concepts in linear algebra . they reveal the internal structure of a matrix . "+
"the characteristic polynomial of a matrix is obtained by computing the determinant of the matrix minus lambda times the identity . the roots of this polynomial are the eigenvalues . for a two by two matrix this gives a quadratic equation that can be solved by hand . "+
"symmetric matrices have a special property . all their eigenvalues are real numbers and their eigenvectors are orthogonal . this means the eigenvectors form a natural coordinate system for the matrix . "+
"the spectral theorem states that every symmetric matrix can be written as a sum of its eigenvalues times the outer products of its eigenvectors . this is called the spectral decomposition . it reveals the fundamental structure of the matrix . "+
"principal component analysis uses the spectral theorem to find the directions of maximum variance in a dataset . these directions are the eigenvectors of the covariance matrix with the largest eigenvalues . "+
"in quantum mechanics every observable quantity is associated with a linear operator . the eigenvalues of the operator represent the possible measurement outcomes . when a measurement is performed the system collapses into one of the eigenstates . "+
"the energy levels of an atom are the eigenvalues of the hamiltonian operator . the hydrogen atom has energy levels proportional to one over n squared . the schrodinger equation is itself an eigenvalue equation . "+
"every quantum state can be expressed as a superposition of eigenstates . this is the foundation of quantum mechanics . the wave function describes the probability amplitude for each eigenstate . "+
"the fourier transform decomposes a signal into its constituent frequencies . the sine and cosine functions are eigenfunctions of the second derivative operator . the fourier series is an eigenfunction expansion . "+
"this creates a deep connection between signal processing and quantum mechanics . both use eigenvalue decomposition to analyze the structure of functions and operators . "+
"google pagerank is an eigenvalue problem . the importance of a webpage is determined by the dominant eigenvector of the google matrix . a random surfer model describes a user who clicks on links with some probability and teleports to a random page otherwise . "+
"the power iteration algorithm computes the pagerank vector by repeatedly multiplying the google matrix with the current estimate . convergence typically requires about fifty iterations even for billions of web pages . "+
"larry page and sergey brin developed pagerank at stanford university . the algorithm transformed web search and became the foundation of one of the most valuable companies in history . "+
"kernel ridge regression is a powerful machine learning method . it uses kernel functions to perform nonlinear regression . the kernel trick replaces the inner product matrix with a kernel matrix . "+
"this allows the algorithm to operate in a potentially infinite dimensional feature space without explicitly computing the features . the gaussian kernel measures the similarity between two data points using a bell shaped function . "+
"the bandwidth parameter sigma controls how quickly the similarity decays with distance . a small sigma means only nearby points are considered similar . a large sigma means even distant points influence each other . "+
"the representer theorem is a fundamental result in kernel methods . it states that the optimal solution of kernel ridge regression can always be written as a linear combination of kernel evaluations at the training points . "+
"this means the training data is the model . there are no abstract parameters . there are no weight matrices . there are no hidden layers . the function is completely determined by the data points and their kernel similarities . "+
"the universal approximation theorem proved by cybenko in nineteen eighty nine shows that neural networks with a single hidden layer can approximate any continuous function to arbitrary accuracy . "+
"similarly kernel ridge regression with a universal kernel such as the gaussian kernel can also approximate any continuous function . both function classes are dense in the space of continuous functions . they are equally powerful in theory . "+
"the neural tangent kernel discovered by jacot gabriel and hongler provides a deep connection between neural networks and kernel methods . in the idealized limit of infinite width a neural network trained by gradient descent behaves exactly like kernel ridge regression . "+
"this is not a metaphor . it is a rigorous mathematical theorem . the eigenvalues of the neural tangent kernel determine which functions the network learns quickly and which it learns slowly . "+
"the neumann series is a fundamental tool in linear algebra . it states that the sum of all powers of a matrix converges to the inverse of the identity minus that matrix . this requires all eigenvalues to have magnitude less than one . "+
"the iterative residual correction method uses this fact . instead of inverting a matrix directly you compute the solution by repeatedly correcting your error . each iteration reduces the residual . the convergence rate depends on the eigenvalues . "+
"regularization prevents overfitting in machine learning . ridge regression adds a penalty term lambda times the squared norm of the coefficients . this shrinks the contributions from small eigenvalue directions . "+
"a remarkable equivalence exists between ridge regularization and early stopping . the ridge parameter lambda is approximately equal to one divided by the number of iterations . this means regularization is the natural consequence of stopping before convergence . "+
"large eigenvalues correspond to signal in the data . they are captured quickly by the iterative method . small eigenvalues correspond to noise . they require many iterations to capture . stopping early means learning signal and ignoring noise . "+
"in computer graphics the radiosity equation describes global illumination . light bounces between surfaces and each bounce adds realism . the radiosity equation is solved using the neumann series . each term represents one additional light bounce . "+
"the transfer matrix in radiosity is substochastic because some energy is absorbed at each surface . adding an absorber dimension makes it stochastic . a stochastic matrix is a markov chain transition matrix . "+
"the equilibrium of a markov chain is the dominant eigenvector with eigenvalue one . this connects computer graphics to probability theory through eigenvalue decomposition . "+
"attention mechanisms in transformer models compute similarity matrices between tokens . the softmax normalized attention matrix is essentially a kernel matrix . each attention head computes a different kernel . "+
"stacking multiple layers of attention is analogous to iterating the residual correction with different kernels at each step . the skip connections in transformers add the correction to the current estimate . "+
"transformers are iterative kernel ridge regression with learned kernels . this insight connects the entire chain from simple linear regression through eigenvalues and kernel methods all the way to modern language models . "+
"random fourier features approximate kernel evaluations using random projections . this reduces the computational cost from cubic to linear in the number of data points . the performer architecture uses this trick to make attention linear . "+
"the connection between quantum mechanics and artificial intelligence runs deep . the propagator in quantum mechanics and the kernel in machine learning share the same mathematical structure . "+
"both are sums over eigenfunctions weighted by eigenvalues . eigenvalues are the universal mathematical language for understanding complex systems . "+
"machine learning is fundamentally about finding patterns in data . the eigenvalue structure of the data determines which patterns are easy to learn and which are hard . "+
"a model that captures the large eigenvalue directions captures the signal . a model that also fits the small eigenvalue directions overfits the noise . the art of machine learning is knowing when to stop . "+
"the condition number of a matrix is the ratio of its largest to its smallest eigenvalue . a large condition number means the matrix is ill conditioned . small perturbations in the input cause large changes in the output . "+
"this is why direct matrix inversion is numerically unstable . the iterative approach avoids this problem because it never computes the inverse directly . it only multiplies and adds . "+
"eigenvalues appear everywhere in science and engineering . in structural analysis they determine the natural frequencies of a bridge or building . in population dynamics they determine growth rates . "+
"in control theory eigenvalues determine whether a system is stable or unstable . in quantum chemistry they determine molecular orbitals and bonding energies . "+
"the beauty of eigenvalue theory is its universality . the same mathematical framework applies to vibrating strings quantum particles web pages neural networks and everything in between .";

var words = RAW.toLowerCase().split(/\s+/);
var vocabSet={},vocabList=[],W2I={},I2W={};
for(var i=0;i<words.length;i++){if(!vocabSet[words[i]]){vocabSet[words[i]]=true;W2I[words[i]]=vocabList.length;I2W[vocabList.length]=words[i];vocabList.push(words[i]);}}
var VOCAB=vocabList.length;

var CTX=5,HASH=128,N_BI=3,FEAT=CTX*HASH+N_BI*HASH,D=2048,SIGMA=1.5,LAM=0.008;

function hashW(w){var h=0;for(var i=0;i<w.length;i++)h=((h*31)+w.charCodeAt(i))|0;return((h%HASH)+HASH)%HASH;}
function hashP(a,b){var s=a+'|'+b;var h=0;for(var i=0;i<s.length;i++)h=((h*37)+s.charCodeAt(i))|0;return((h%HASH)+HASH)%HASH;}

function encode(ctx){
  var vec=new Float32Array(FEAT);
  for(var p=0;p<CTX;p++){var w=ctx[p]||'';if(!w)continue;var wt=0.4+0.6*(p/(CTX-1));vec[p*HASH+hashW(w)]+=wt;if(W2I[w]!==undefined)vec[p*HASH+(W2I[w]%HASH)]+=wt*0.5;}
  var bo=CTX*HASH;
  for(var b=0;b<N_BI;b++){var p1=CTX-N_BI-1+b,p2=p1+1;if(p1<0||!ctx[p1]||!ctx[p2])continue;vec[bo+b*HASH+hashP(ctx[p1],ctx[p2])]=1.0;}
  return vec;
}

var omega,bias;
function initRFF(){
  omega=new Float32Array(FEAT*D);bias=new Float32Array(D);
  for(var i=0;i<FEAT*D;i+=2){var u1=Math.random(),u2=Math.random();var r=Math.sqrt(-2*Math.log(Math.max(u1,1e-10)));omega[i]=r*Math.cos(2*Math.PI*u2)/SIGMA;if(i+1<FEAT*D)omega[i+1]=r*Math.sin(2*Math.PI*u2)/SIGMA;}
  for(var i=0;i<D;i++)bias[i]=Math.random()*2*Math.PI;
}
function rff(vec){
  var z=new Float32Array(D),sc=Math.sqrt(2.0/D),nz=[];
  for(var k=0;k<FEAT;k++)if(vec[k]!==0)nz.push(k);
  for(var j=0;j<D;j++){var dot=0;for(var ni=0;ni<nz.length;ni++){var k=nz[ni];dot+=vec[k]*omega[k*D+j];}z[j]=Math.cos(dot+bias[j])*sc;}
  return z;
}

var pb=document.getElementById('pb'),stEl=document.getElementById('st'),chatEl=document.getElementById('chat');
var inEl=document.getElementById('in'),goBtn=document.getElementById('go');
var tmpSl=document.getElementById('tmp'),tvEl=document.getElementById('tv');
var topkSl=document.getElementById('topk'),kvEl=document.getElementById('kv');
var mwSl=document.getElementById('mw'),wvEl=document.getElementById('wv');
var nfoEl=document.getElementById('nfo'),exEl=document.getElementById('examples');
tmpSl.oninput=function(){tvEl.textContent=parseFloat(tmpSl.value).toFixed(2);};
topkSl.oninput=function(){kvEl.textContent=topkSl.value;};
mwSl.oninput=function(){wvEl.textContent=mwSl.value;};

function setSt(msg,cls,pct){stEl.textContent=msg;stEl.className='st '+(cls||'');if(pct!==undefined)pb.style.width=pct+'%';}
function addMsg(txt,cls){var d=document.createElement('div');d.className='m '+cls;if(typeof txt==='string')d.textContent=txt;else d.appendChild(txt);chatEl.appendChild(d);chatEl.scrollTop=chatEl.scrollHeight;return d;}

var W=null;
function train(){
  setSt('Initializing random projections (D='+D+')...','t',5);
  setTimeout(function(){
    initRFF();
    setSt('Encoding '+words.length+' word tokens ('+VOCAB+' unique)...','t',12);
    setTimeout(function(){
      var N=words.length-CTX;var Z=new Array(N);var Y=new Int32Array(N);
      for(var i=0;i<N;i++){Z[i]=rff(encode(words.slice(i,i+CTX)));Y[i]=W2I[words[i+CTX]];if(i%1000===0)pb.style.width=(12+30*i/N)+'%';}
      setSt('Computing Z^TZ ('+D+'x'+D+')...','t',45);
      setTimeout(function(){
        var ZTZ=new Float64Array(D*D);
        for(var i=0;i<N;i++){var zi=Z[i];for(var a=0;a<D;a++){var za=zi[a];if(Math.abs(za)<1e-8)continue;var ro=a*D;for(var b=a;b<D;b++){var v=za*zi[b];ZTZ[ro+b]+=v;if(a!==b)ZTZ[b*D+a]+=v;}}}
        for(var i=0;i<D;i++)ZTZ[i*D+i]+=LAM;
        var ZTY=new Float64Array(D*VOCAB);
        for(var i=0;i<N;i++){var zi=Z[i],yi=Y[i];for(var j=0;j<D;j++)ZTY[j*VOCAB+yi]+=zi[j];}
        setSt('Solving '+D+'x'+D+' system ('+VOCAB+' word classes)...','t',58);
        setTimeout(function(){
          var cols=D+VOCAB;var M=new Float64Array(D*cols);
          for(var i=0;i<D;i++){for(var j=0;j<D;j++)M[i*cols+j]=ZTZ[i*D+j];for(var j=0;j<VOCAB;j++)M[i*cols+D+j]=ZTY[i*VOCAB+j];}
          ZTZ=null;ZTY=null;
          for(var col=0;col<D;col++){
            var mr=col,mv=Math.abs(M[col*cols+col]);
            for(var r=col+1;r<D;r++){var av=Math.abs(M[r*cols+col]);if(av>mv){mv=av;mr=r;}}
            if(mr!==col)for(var j=col;j<cols;j++){var t=M[col*cols+j];M[col*cols+j]=M[mr*cols+j];M[mr*cols+j]=t;}
            var piv=M[col*cols+col];if(Math.abs(piv)<1e-14)continue;
            for(var r=col+1;r<D;r++){var f=M[r*cols+col]/piv;if(Math.abs(f)<1e-14)continue;for(var j=col;j<cols;j++)M[r*cols+j]-=f*M[col*cols+j];}
            if(col%200===0)pb.style.width=(58+30*col/D)+'%';
          }
          W=new Float64Array(D*VOCAB);
          for(var i=D-1;i>=0;i--){var piv=M[i*cols+i];if(Math.abs(piv)<1e-14)continue;for(var v=0;v<VOCAB;v++){var val=M[i*cols+D+v];for(var j=i+1;j<D;j++)val-=M[i*cols+j]*W[j*VOCAB+v];W[i*VOCAB+v]=val/piv;}}
          M=null;Z=null;
          setSt('Testing...','t',92);
          setTimeout(function(){
            var correct=0,total=0,top3=0;
            var ts=Math.max(0,words.length-CTX-300);
            for(var i=ts;i<words.length-CTX;i++){
              var ctx=words.slice(i,i+CTX);var z=rff(encode(ctx));
              var scores=new Float64Array(VOCAB);
              for(var j=0;j<D;j++){var zj=z[j];if(Math.abs(zj)<1e-8)continue;for(var v=0;v<VOCAB;v++)scores[v]+=zj*W[j*VOCAB+v];}
              var best=0;for(var v=1;v<VOCAB;v++)if(scores[v]>scores[best])best=v;
              var target=W2I[words[i+CTX]];
              if(best===target)correct++;
              var s3=[];for(var v=0;v<VOCAB;v++)s3.push({s:scores[v],i:v});s3.sort(function(a,b){return b.s-a.s;});
              if(s3[0].i===target||s3[1].i===target||s3[2].i===target)top3++;
              total++;
            }
            var acc1=(100*correct/total).toFixed(0),acc3=(100*top3/total).toFixed(0);
            pb.style.width='100%';
            setSt('Ready \u2014 '+words.length+' tokens, '+VOCAB+' words, D='+D+', top-1='+acc1+'%, top-3='+acc3+'%','r');
            nfoEl.textContent='vocab='+VOCAB+' \u00B7 top-1='+acc1+'% \u00B7 top-3='+acc3+'%';
            inEl.disabled=false;goBtn.disabled=false;inEl.focus();
            addMsg('Word-level KRR language model. Trained on '+words.length+' word tokens ('+VOCAB+' unique). No neural network \u2014 just eigenvalues, Random Fourier Features, and a '+D+'\u00D7'+D+' linear system solved in your browser. Type a few words!','s');
            ['the eigenvalue','kernel ridge regression','in quantum mechanics','the neumann series','google pagerank is','neural networks with','attention mechanisms in','machine learning is'].forEach(function(ex){
              var btn=document.createElement('button');btn.textContent=ex;
              btn.onclick=function(){inEl.value=ex;handleSend();};exEl.appendChild(btn);
            });
          },10);
        },10);
      },10);
    },10);
  },10);
}

function predictWord(contextWords,temperature,topK,recentWords){
  var ctx=contextWords.slice(-CTX);while(ctx.length<CTX)ctx.unshift('');
  var z=rff(encode(ctx));var scores=new Float64Array(VOCAB);
  for(var j=0;j<D;j++){var zj=z[j];if(Math.abs(zj)<1e-8)continue;for(var v=0;v<VOCAB;v++)scores[v]+=zj*W[j*VOCAB+v];}
  if(recentWords)for(var r=0;r<recentWords.length;r++){var ri=W2I[recentWords[r]];if(ri!==undefined)scores[ri]*=0.25;}
  var indexed=[];for(var v=0;v<VOCAB;v++)indexed.push({s:scores[v],i:v});
  indexed.sort(function(a,b){return b.s-a.s;});
  var top=indexed.slice(0,topK);var maxS=top[0].s,sum=0;
  for(var k=0;k<top.length;k++){top[k].p=Math.exp((top[k].s-maxS)/Math.max(temperature,0.005));sum+=top[k].p;}
  for(var k=0;k<top.length;k++)top[k].p/=sum;
  var r=Math.random(),c=0;
  for(var k=0;k<top.length;k++){c+=top[k].p;if(r<c)return I2W[top[k].i];}
  return I2W[top[top.length-1].i];
}

function handleSend(){
  var text=inEl.value.trim().toLowerCase();if(!text||!W)return;inEl.value='';
  addMsg(text,'u');
  var temp=parseFloat(tmpSl.value),topK=parseInt(topkSl.value),maxW=parseInt(mwSl.value);
  var inputWords=text.split(/\s+/),allWords=inputWords.slice(),recent=[];
  var container=document.createDocumentFragment();
  var seedSpan=document.createElement('span');seedSpan.className='sd';seedSpan.textContent=text+' ';container.appendChild(seedSpan);
  var genSpan=document.createElement('span');genSpan.className='gn';container.appendChild(genSpan);
  var botEl=addMsg(container,'b');
  var wi=0;
  function step(){
    if(wi>=maxW){var badge=document.createElement('span');badge.className='bd';badge.textContent='KRR \u00B7 D='+D+' \u00B7 top-'+topK+' \u00B7 T='+temp.toFixed(2);botEl.appendChild(badge);return;}
    var next=predictWord(allWords,temp,topK,recent);allWords.push(next);recent.push(next);if(recent.length>8)recent.shift();
    genSpan.textContent+=(wi>0?' ':'')+next;wi++;chatEl.scrollTop=chatEl.scrollHeight;
    setTimeout(step,(next==='.'||next===',')?80:30);
  }
  setTimeout(step,150);
}
goBtn.onclick=handleSend;inEl.onkeydown=function(e){if(e.key==='Enter')handleSend();};
setTimeout(train,80);
})();
</script>
</body>
</html>
